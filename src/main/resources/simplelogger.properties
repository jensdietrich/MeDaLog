# SLF4J Simple logger configuration for MeDaLog compiler

# Default log level
org.slf4j.simpleLogger.defaultLogLevel=INFO

# Log level for MeDaLog classes
org.slf4j.simpleLogger.log.io.github.bineq.medalog=INFO

# Output to System.err (default)
org.slf4j.simpleLogger.logFile=System.err

# Include the date/time in log output
org.slf4j.simpleLogger.showDateTime=false

# Show the thread name
org.slf4j.simpleLogger.showThreadName=false

# Show the log level
org.slf4j.simpleLogger.levelInBrackets=true

# Show the short logger name
org.slf4j.simpleLogger.showShortLogName=true
